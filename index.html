<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Creator Store Converter</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; box-sizing: border-box; background: #2a2a2a; border: 1px solid #333; color: white; border-radius: 6px; margin: 10px 0; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #00a2ff; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #252525; border-radius: 8px; display: none; border-left: 4px solid #00a2ff; }
        .label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .val { font-family: monospace; font-size: 18px; color: #00e5ff; word-break: break-all; user-select: all; }
        #status { font-size: 13px; margin-top: 10px; color: #ffbb00; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Creator Store Converter</h3>
        <p style="font-size: 13px; color: #aaa;">Works for Marketplace Accessories AND Creator Store Models/Meshes.</p>
        <input type="text" id="assetInput" placeholder="Paste Asset ID or URL">
        <button onclick="convert()">Extract IDs</button>
        <div id="status"></div>

        <div id="meshBox" class="result">
            <div class="label">Mesh ID</div>
            <div id="meshOut" class="val"></div>
        </div>

        <div id="texBox" class="result">
            <div class="label">Texture ID</div>
            <div id="texOut" class="val"></div>
        </div>
    </div>

    <script>
        async function convert() {
            const input = document.getElementById('assetInput').value;
            const id = input.match(/\d+/)?.[0];
            const status = document.getElementById('status');
            const meshBox = document.getElementById('meshBox');
            const texBox = document.getElementById('texBox');

            if (!id) { status.innerText = "Please enter a valid ID."; return; }

            status.innerText = "Searching Roblox servers...";
            meshBox.style.display = texBox.style.display = 'none';

            try {
                // We use a CORS proxy to fetch the raw asset data from Roblox
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://assetdelivery.roblox.com/v1/asset/?id=' + id)}`);
                const data = await response.json();
                const content = data.contents;

                if (!content) throw new Error();

                // Advanced Regex to find MeshId and TextureId in various formats (XML, Model, Accessory)
                const meshMatch = content.match(/(?:MeshId|meshid).*?(?:id=|rbxassetid:\/\/|asset\/\?id=)(\d+)/i);
                const texMatch = content.match(/(?:TextureId|Texture).*?(?:id=|rbxassetid:\/\/|asset\/\?id=)(\d+)/i);

                status.innerText = "";

                if (meshMatch) {
                    document.getElementById('meshOut').innerText = meshMatch[1];
                    meshBox.style.display = 'block';
                }
                if (texMatch) {
                    document.getElementById('texOut').innerText = texMatch[1];
                    texBox.style.display = 'block';
                }

                if (!meshMatch && !texMatch) {
                    status.innerText = "No IDs found. This might be a script or a basic Part.";
                }

            } catch (e) {
                status.innerText = "Error: Asset is private or invalid.";
            }
        }
    </script>
</body>
</html>
