<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Asset ID Converter</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1e1e24; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: #2b2b36; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        input { 
            width: calc(100% - 22px); 
            padding: 12px; 
            margin: 15px 0; 
            border: 1px solid #48cae4; 
            border-radius: 5px; 
            background-color: #1e1e24; 
            color: #fff; 
            font-size: 16px;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 5px #48cae4;
        }
        button { 
            background-color: #00b4d8; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            width: 100%; 
            margin-bottom: 20px; 
            transition: background-color 0.2s;
        }
        button:hover { 
            background-color: #0096c7; 
        }
        .result-box { 
            background-color: #1e1e24; 
            padding: 15px; 
            border-radius: 5px; 
            margin-top: 10px; 
            text-align: left; 
            border-left: 4px solid #48cae4;
        }
        .label { 
            font-size: 12px; 
            color: #aaa; 
            text-transform: uppercase; 
            margin-bottom: 5px; 
            letter-spacing: 1px;
        }
        .id-value { 
            font-size: 20px; 
            font-weight: bold; 
            color: #48cae4; 
            user-select: all; /* Makes it easy to copy */
        }
        #errorMsg { 
            color: #ff4d4d; 
            font-size: 14px; 
            margin-top: 10px; 
            display: none; 
        }
        #loading {
            color: #00b4d8;
            font-size: 14px;
            display: none;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Asset Converter</h2>
        <p style="font-size: 14px; color: #ccc;">Enter a Catalog Asset ID (e.g., a hat or hair) to extract the raw Mesh and Texture IDs.</p>
        
        <input type="number" id="assetId" placeholder="e.g. 1439266184">
        <button onclick="convertId()">Extract IDs</button>

        <div id="loading">Fetching data from Roblox API...</div>
        <div id="errorMsg"></div>

        <div class="result-box" id="meshResult" style="display: none;">
            <div class="label">Mesh ID</div>
            <div class="id-value" id="meshIdOutput">-</div>
        </div>

        <div class="result-box" id="textureResult" style="display: none;">
            <div class="label">Texture ID</div>
            <div class="id-value" id="textureIdOutput">-</div>
        </div>
    </div>

    <script>
        async function convertId() {
            const assetId = document.getElementById('assetId').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const loading = document.getElementById('loading');
            const meshResult = document.getElementById('meshResult');
            const textureResult = document.getElementById('textureResult');
            const meshOut = document.getElementById('meshIdOutput');
            const texOut = document.getElementById('textureIdOutput');

            // Reset UI
            errorMsg.style.display = 'none';
            meshResult.style.display = 'none';
            textureResult.style.display = 'none';

            if (!assetId) {
                showError("Please enter a valid Asset ID.");
                return;
            }

            loading.style.display = 'block';

            try {
                // Fetching the Roblox AssetDelivery API via a CORS proxy
                const robloxUrl = `https://assetdelivery.roblox.com/v1/asset/?id=${assetId}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(robloxUrl)}`;

                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Network response failed");

                const data = await response.json();
                
                if (!data.contents) {
                    throw new Error("Could not read asset data. The asset might be private.");
                }

                const xmlData = data.contents;

                // Regex to hunt down the hidden IDs inside the Roblox XML code
                const meshRegex = /name="MeshId".*?(?:id=|rbxassetid:\/\/)([\d]+)/is;
                const texRegex = /name="TextureId".*?(?:id=|rbxassetid:\/\/)([\d]+)/is;

                const meshMatch = xmlData.match(meshRegex);
                const texMatch = xmlData.match(texRegex);

                loading.style.display = 'none';

                if (!meshMatch && !texMatch) {
                    showError("Could not find Mesh or Texture IDs. Make sure this is a 3D accessory or gear, not an audio file or raw mesh.");
                    return;
                }

                if (meshMatch) {
                    meshOut.innerText = meshMatch[1];
                    meshResult.style.display = 'block';
                }
                
                if (texMatch) {
                    texOut.innerText = texMatch[1];
                    textureResult.style.display = 'block';
                }

            } catch (error) {
                loading.style.display = 'none';
                showError("Error fetching asset. Ensure the ID is correct and public.");
                console.error(error);
            }
        }

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = msg;
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
